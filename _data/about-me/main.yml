name:
  ko : "남주호"
  en : "Ju Ho Nam"
job_title:
  ko: "AI 엔지니어"
  en: "AI Engineer"
title:
  ko: "AI 엔지니어 남주호입니다."
  en: "Hi, I'm Ju Ho Nam, an AI Engineer passionate about solving complex problems."
description:
  - type: paragraph
    inner:
      ko: "수학적 배경과 탄탄한 소프트웨어 엔지니어링 역량을 바탕으로, 이제는 AI 기술을 통해 실제 세상의 문제를 해결하는 데 집중하고 있습니다. 서비스 개발부터 AI 모델 연구 및 개발까지 폭넓은 경험을 쌓아왔으며, 최근 Kaggle NFL Big Data Bowl 2026에서 상위 7%를 기록하는 등 데이터 분석과 모델링 능력을 증명해 보였습니다. 복잡한 문제를 수식과 코드로 풀어내며 가치를 창출하는 AI 엔지니어로 성장하고 있습니다."
      en: "Building on a strong mathematical background and solid software engineering foundations, I am now focusing on solving real-world problems through AI technology. With a diverse portfolio ranging from service development to AI model R&D, I have demonstrated my analytical skills by ranking in the top 7% of the Kaggle NFL Big Data Bowl 2026. I am evolving into an AI Engineer who creates value by translating complex challenges into elegant mathematical models and robust code."
