data:
  - title:
      ko: "실시간 Person Re-identification 모델"
      en: "Real-time Person Re-identification Model"
    hide: true
    status:
      ko: "오픈소스"
      en: "Open Source"
      color: success
    images:
      - url: "/images/projects/reid-1.jpg"
        orientation: landscape
      - url: "/images/projects/reid-2.jpg"
        orientation: landscape
    period:
      period_str: "2024.07 ~"
      type: development
    specs:
      - python
      - pytorch
      - onnx
      - react
      - typescript
    brief_description:
      - type: list
        inner:
          - ko: "모바일 및 엣지 환경에서 실시간으로 동작하는 신체 부위 기반의 Person Re-identification 모델"
            en: "A body part-based Person Re-identification model that operates in real-time on mobile and edge environments"
    description:
      - type: link_buttons
        inner:
          - label:
              ko: "소스코드"
              en: "Source Code"
            url: "https://github.com/juhonamnam/realtime-re-id"
          - label:
              ko: "웹 데모"
              en: "Web Demo"
            url: "https://juhonamnam.github.io/realtime-re-id"
          - label:
              ko: "개발기"
              en: "Development Story"
            url: "https://juhonamnam.github.io/blog/post/22"

      - type: paragraph
        inner:
          ko: "여러 대의 카메라 환경에서 동일인을 식별하는 Re-ID 기술을 모바일/엣지 환경에 최적화하여 구현했습니다. 신체 부위별 특징을 활용하는 <strong>BPBReID</strong> 모델에서 영감을 받아, 이를 실시간 추론 목적에 맞게 경량화 및 재설계했습니다. MobileNetV3와 FPN 구조를 결합하고, 사람의 신체 부위를 5개로 나누어 각각의 특징을 추출하는 Part-based representation 방식을 채택했습니다."
          en: "I implemented Person Re-identification (Re-ID) technology, optimized for mobile/edge environments. Inspired by the <strong>BPBReID</strong> model, which utilizes body part features, I redesigned and lightweighted the architecture to suit real-time inference requirements. I combined MobileNetV3 and FPN structures and adopted a Part-based representation method."

      - type: paragraph
        inner:
          ko: "특히, 여러 부위의 유사도를 합산할 때 흔히 쓰이는 <strong>Weighted Mean(가중 평균)</strong> 방식이 특정 부위의 큰 차이를 상쇄해버리는 단점을 보완하고자, 직접 명명한 <strong>'Weakest Link'</strong> 원칙 기반의 유사도 측정법을 제안했습니다. 이는 '쇠사슬의 강도는 가장 약한 고리에 의해 결정된다'는 점에 착안하여, '전체적으로 비슷한가'보다 '각 부분이 모두 비슷한가'에 집중함으로써 단 하나의 결정적인 차이만으로도 오답 후보를 단호하게 배제하도록 설계한 방식입니다. 이를 통해 가려짐(Occlusion) 상황에서도 강건한 성능을 확보했으며, ONNX Runtime Web을 통해 브라우저에서 실시간 추론이 가능한 웹 데모도 구현했습니다."
          en: "To overcome the limitations of the conventional <strong>Weighted Mean</strong> approach—where a significant difference in one part can be masked by high similarities in others—I proposed a similarity measurement method based on my personally named <strong>'Weakest Link'</strong> principle. Inspired by the idea that 'a chain is only as strong as its weakest link,' this method focuses on whether *every* part matches rather than just an overall average. This allows the model to decisively exclude candidates based on even a single definitive difference, ensuring robust performance in occlusion scenarios. I also implemented a serverless web demo using ONNX Runtime Web."

      - type: list
        inner:
          - ko: "BPBReID 모델을 참고하여 실시간 추론에 최적화된 경량 딥러닝 모델 설계 및 학습"
            en: "Design and training of a lightweight deep learning model optimized for real-time inference, inspired by BPBReID"
          - ko: "신체 부위별 가중치를 활용한 Attention 메커니즘 및 Part-based representation"
            en: "Attention mechanism and part-based representation using weights for each body part"
          - ko: "Weakest Link 원칙(결정적 차이를 통한 후보 배제) 기반의 유사도 측정 메트릭 제안"
            en: "Proposal of a similarity metric based on the 'Weakest Link' principle (excluding candidates based on definitive differences)"
          - ko: "ONNX Runtime Web을 활용한 브라우저 내 실시간 추론 데모 구현"
            en: "Implementation of real-time inference demo in browser using ONNX Runtime Web"
          - ko: "저해상도 및 가려짐 등 현실적인 환경 재현을 위한 데이터 증강(Data Augmentation) 적용"
            en: "Application of data augmentation (Random Crop, Resizing) to simulate realistic environments such as low resolution and occlusion"
          - ko: "AI Hub 한국인 재식별 데이터셋 및 COCO DensePose 데이터셋 활용"
            en: "Utilization of AI Hub Korean re-identification dataset and COCO DensePose dataset"

  - title:
      ko: "AI Agent-based Augmented Reading eXperience (AReX)"
      en: "AI Agent-based Augmented Reading eXperience (AReX)"
    status:
      ko: "대회 참가작"
      en: "Competition Entry"
      color: info
    images:
      - url: "/images/projects/arex-1.png"
        orientation: landscape
      - url: "/images/projects/arex-2.png"
        orientation: landscape
      - url: "/images/projects/arex-3.png"
        orientation: landscape
      - url: "/images/projects/arex-4.svg"
        orientation: portrait
      - url: "/images/projects/arex-5.svg"
        orientation: landscape
    team:
      name:
        ko: "The Geppettos"
        en: "The Geppettos"
      size: 2
    period:
      period_str: "2025.07 ~ 2025.10"
      type: development
    specs:
      - typescript
      - react
      - express
      - python
      - docker
      - rabbitmq
      - postgresql
      - langchain
      - chroma
    brief_description:
      - type: list
        inner:
          - ko: "LLM과 RAG 기반의 소설 특화 대화형 전자책 서비스 (대회 출품작)"
            en: "LLM and RAG-based interactive e-book service specialized for novels (competition entry)"
    description:
      - type: link_buttons
        inner:
          - label:
              ko: "소스코드"
              en: "Source Code"
            url: "https://github.com/The-Geppettos/AReX"
          - label:
              ko: "소개 영상"
              en: "Introduction Video"
            url: "https://youtu.be/uCMB6xpeiUM"

      - type: paragraph
        inner:
          ko: "AReX는 Agent AI-based Augmented Reading eXperience의 약자로, 소설책에 특화된 LLM 기반 전자책 서비스입니다. 대학 동기와 함께 개발하였으며, 오픈소스 개발자대회와 사이드임팩트 출품작입니다. 독서량 감소 문제를 해결하고 소설책을 더 즐겁게 읽을 수 있는 방법을 고민하며 착안한 아이디어로, 소설 속 등장인물을 모방하는 대화형 챗봇 기능을 제공합니다. RAG 구조를 활용한 LLM 설계를 통해 사용자가 책 속 인물과 대화하며 몰입할 수 있는 인터랙티브 독서 경험을 구현했습니다."
          en: "AReX stands for Agent AI-based Augmented Reading eXperience, an LLM-based e-book service specialized for novels. It was developed with a college friend and was submitted to an open source developer competition and Side Impact. The idea was conceived to address the issue of declining reading habits and to enhance the enjoyment of reading novels by providing an interactive chatbot feature that mimics characters from the novels. By utilizing an LLM design based on the RAG structure, we have created an immersive interactive reading experience where users can converse with characters from the book."

      - type: list
        inner:
          - ko: "LLM 기반 챗봇"
            en: "LLM-based chatbot"
          - sublist: true
            inner:
              - ko: "도우미 모드: 독서 중 궁금한 점을 질문하고 답변 제공"
                en: "Helper Mode: Ask questions and provide answers while reading"
              - ko: "등장인물 모드: 작품 속 인물의 말투와 지식을 재현"
                en: "Character Mode: Recreate the tone and knowledge of characters in the work"
          - ko: "RAG (Retrieval-Augmented Generation) 기반 책 문맥 제공"
            en: "RAG (Retrieval-Augmented Generation) based book context provision"
          - sublist: true
            inner:
              - ko: "사용자가 현재까지 읽은 범위 내로 한정된 문맥 제공"
                en: "Provide context limited to the range the user has read so far"
          - ko: "책 원문 전처리 파이프라인 아키텍처 설계"
            en: "Designing book text preprocessing pipeline architecture"

  - title:
      ko: "모바일 청첩장"
      en: "Mobile Wedding Invitation"
    images:
      - url: "/images/projects/wedding-invitation-1.png"
        orientation: portrait
      - url: "/images/projects/wedding-invitation-2.png"
        orientation: portrait
      - url: "/images/projects/wedding-invitation-3.png"
        orientation: portrait
      - url: "/images/projects/wedding-invitation-4.png"
        orientation: portrait
      - url: "/images/projects/wedding-invitation-5.png"
        orientation: portrait
      - url: "/images/projects/wedding-invitation-6.png"
        orientation: portrait
    period:
      period_str: "2024.03 ~"
      type: development
    status:
      ko: "오픈소스"
      en: "Open Source"
      color: success
    specs:
      - react
      - go
      - typescript
      - sass
      - nginx
      - sqlite
    brief_description:
      - type: list
        inner:
          - ko: "실제 결혼식을 위해 제작한 React 기반 맞춤형 모바일 청첩장 템플릿 (2026년 5월 기준 fork 90개 돌파)"
            en: "React-based custom mobile wedding invitation template developed for my own wedding (over 90 forks as of May 2026)"
    description:
      - type: link_buttons
        inner:
          - label:
              ko: "소스코드"
              en: "Source Code"
            url: "https://github.com/juhonamnam/wedding-invitation"
          - label:
              ko: "청첩장 샘플"
              en: "Wedding Invitation Sample"
            url: "https://juhonamnam.github.io/wedding-invitation"
          - label:
              ko: "개발기"
              en: "Development Story"
            url: "https://juhonamnam.github.io/blog/post/18"

      - type: paragraph
        inner:
          ko: "실제 저의 결혼식을 위해 직접 제작한 React 기반 모바일 청첩장입니다. 기존 서비스 디자인의 제약을 극복하기 위해 UI를 직접 설계하고, 도메인을 구입하여 Naver Cloud Platform에 배포해 실제로 사용했습니다. 단순한 개인 용도에서 출발했지만 다른 사용자들의 문의가 들어오면서 오픈소스 템플릿으로 전환했습니다. 현재 재사용성과 확장성을 고려해 지속적으로 개선하고 있습니다."
          en: "This is a React-based mobile wedding invitation that I personally developed for my own wedding. To overcome the design limitations of existing services, I designed the UI myself, purchased a domain, and deployed it on Naver Cloud Platform for actual use. Although it started as a simple personal project, it was converted into an open-source template due to inquiries from other users. I am continuously improving it with reusability and scalability in mind."

      - type: list
        inner:
          - ko: "다양한 모바일 화면 사이즈에 대응하는 반응형 웹 디자인"
            en: "Responsive web design for various mobile screen sizes"
          - ko: "캐러셀, 모달, 방명록 등 복합적인 Event 기반 UI 기능 구현"
            en: "Complex event based UI features such as carousel, modal, and guestbook"
          - ko: "도메인 연동과 SSL 인증서로 Naver Cloud Platform 배포"
            en: "Deployment on Naver Cloud Platform along with connecting domain and SSL certification"
          - ko: "Naver Map API, Kakao SDK 등 외부 API 연동"
            en: "Integration with external APIs such as Naver Map API and Kakao SDK"
          - ko: "MIT 라이선스로 템플릿 공개 (2026년 5월 기준 fork 90개 돌파)"
            en: "Released the template under MIT license (over 90 forks as of May 2026)"

  - title:
      ko: "가상화폐 자동매매 프로그램"
      en: "Cryptocurrency Automated Trading Program"
    images:
      - url: "/images/projects/trade-1.jpg"
        orientation: portrait
      - url: "/images/projects/trade-2.png"
        orientation: portrait
      - url: "/images/projects/trade-3.jpg"
        orientation: portrait
      - url: "/images/projects/trade-4.svg"
        orientation: landscape
    period:
      period_str: "2021.05 ~ 2023.07"
      type: development
    status:
      ko: "서비스 종료"
      en: "Service Discontinued"
      color: warning
    specs:
      - go
      - python
      - mysql
      - docker
    brief_description:
      - type: list
        inner:
          - ko: "투자 전략을 자동화한 가상화폐 트레이딩 봇 프로그램"
            en: "A cryptocurrency trading bot program that automates investment strategies"
    description:
      - type: paragraph
        inner:
          ko: "프로그래밍 입문 시 개발한 투자 알고리즘 자동화 프로그램입니다. 래리 윌리엄스의 변동성 돌파 전략을 참고해 투자 알고리즘을 직접 설계하고, Python과 UPbit Open API를 활용해 매수·매도 로직을 자동화했습니다. 또한 투자 전략으로 AI 기반 모델 활용 가능성을 검토해 보기도 했습니다. 실제 자본을 투입해 약 10%의 누적 수익을 냈으며, 이후에는 메신저봇을 통한 모의투자 시그널 시스템으로 발전시켰습니다. 실제 수익을 달성하긴 했지만, 알고리즘이 반드시 일반 투자보다 우월하지 않음을 배웠습니다."
          en: "This is an automated trading program developed when I first started programming. I designed a trading algorithm based on Larry Williams' volatility breakout strategy and automated the buy and sell logic using Python and UPbit Open API. I also explored the possibility of using AI-based models for trading strategies. I achieved a cumulative return of about 10% with real capital, and later evolved it into a mock trading signal system through a messenger bot. Although I achieved actual profits, I learned that algorithms are not necessarily superior to general investing."

      - type: list
        inner:
          - ko: "래리 윌리엄스의 변동성 돌파 전략을 참고해 투자 알고리즘을 직접 설계"
            en: "Design and implement a trading algorithm based on Larry Williams' volatility breakout strategy"
          - ko: "거래소에서 WebSocket Client을 통해 실시간 가격 정보 수신"
            en: "Receive real-time price information from exchanges via WebSocket Client"
          - ko: "Telegram Bot API를 통해 실시간 매수, 매도 시그널 전송"
            en: "Send real-time buy and sell signals via Telegram Bot API"
          - ko: "누적 수익률 10% 달성"
            en: "Achieved cumulative return of 10%"
